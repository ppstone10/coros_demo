syntax = "proto3";

package training.auth;

enum MeasurementSystem {
  MEASUREMENT_SYSTEM_UNSPECIFIED = 0;
  METRIC = 1;
  IMPERIAL = 2;
}

enum UserGender {
  USER_GENDER_UNSPECIFIED = 0;
  MALE = 1;
  FEMALE = 2;
}

enum MockErrorCode {
  MOCK_ERROR_CODE_UNSPECIFIED = 0;
  AUTH_REQUIRED = 1;
  INVALID_PARAM = 2;
  ACCOUNT_EXISTS = 3;
  ACCOUNT_NOT_FOUND = 4;
  PASSWORD_INCORRECT = 5;
  VERIFY_CODE_INVALID = 6;
  VERIFY_CODE_EXPIRED = 7;
  PERSIST_FAILED = 8;
  REGION_REQUIRED = 9;
  NEW_PASSWORD_SAME_AS_OLD = 10;
  EMPTY_DATA = 11;
  CORRUPTED_DATA = 12;
}

message MockErrorMessage {
  MockErrorCode code = 1;
  string message = 2;
}

message MockAuthRegion {
  string region = 1;
  string display_name = 2;
  bool is_default = 3;
}

message UserProfile {
  optional string avatar_uri = 1;
  string username = 2;
  string birth_date = 3;
  optional int32 height_cm = 4;
  optional double weight_kg = 5;
  MeasurementSystem measurement_system = 6;
  string phone = 7;
  string country_region = 8;
  optional UserGender gender = 9;
}

message MockAccount {
  string user_id = 1;
  string account = 2;
  string password_hash = 3;
  string display_name = 4;
  string region = 5;
  optional UserProfile profile = 6;
}

message MockAuthSession {
  string user_id = 1;
  string account = 2;
  string display_name = 3;
  string region = 4;
  bool is_valid = 5;
  optional UserProfile profile = 6;
  int64 issued_at_epoch_ms = 7;
  int64 expire_at_epoch_ms = 8;
}

message MockVerifyCodeState {
  string account = 1;
  string code = 2;
  int64 expire_at_epoch_ms = 3;
}

message MockAuthStore {
  repeated MockAccount accounts = 1;
  optional MockAuthSession current_session = 2;
  repeated MockVerifyCodeState verify_codes = 3;
  bool default_accounts_initialized = 4;
}
