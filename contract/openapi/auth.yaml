openapi: 3.1.0
info:
  title: Demo Auth API
  version: 0.1.0
paths:
  /auth/login:
    post:
      summary: Login with username and password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestDto'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    LoginRequestDto:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
    UserDto:
      type: object
      required:
        - id
        - displayName
        - accessToken
      properties:
        id:
          type: string
        displayName:
          type: string
        accessToken:
          type: string
    ErrorCode:
      type: string
      enum:
        - AUTH_USERNAME_REQUIRED
        - AUTH_PASSWORD_REQUIRED
        - AUTH_INVALID_CREDENTIALS
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
